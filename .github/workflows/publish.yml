name: Build, Test and Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # 1. SMOKETEST (CLOUD-OPTIMIERT)
      # ==========================================
      - name: Run Smoketest
        run: |
          # Wir erstellen die .env.prod direkt im docker-Ordner
          cat <<EOF > docker/.env.prod
          ENV_TYPE=prod
          DB_HOST=db
          DB_NAME=lyndrix_db
          DB_USER=admin
          DB_PASSWORD=testpass
          DB_ROOT_PASSWORD=testroot
          STORAGE_SECRET=test_secret_12345
          VAULT_URL=http://vault:8200
          VAULT_SKIP_VERIFY=true
          # Für MariaDB Container-Logik
          MARIADB_ROOT_PASSWORD=testroot
          MARIADB_DATABASE=lyndrix_db
          MARIADB_USER=admin
          MARIADB_PASSWORD=testpass
          EOF

          # Wir testen das PROD-Setup (keine Mounts, echtes Image)
          # --env-file sorgt dafür, dass Docker die Variablen auch im YAML findet
          docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod up -d --build

          echo "Warte auf System-Boot (30s)..."
          sleep 30

          # Debug: Status anzeigen
          docker ps -a

          if curl --retry 5 --retry-delay 5 -f http://localhost:8081/; then
            echo "✅ SMOKETEST BESTANDEN!"
          else
            echo "❌ SMOKETEST FEHLGESCHLAGEN! Logs:"
            docker compose -f docker/docker-compose.prod.yml logs db
            docker compose -f docker/docker-compose.prod.yml logs lyndrix
            exit 1
          fi

          docker compose -f docker/docker-compose.prod.yml down -v

      # ==========================================
      # 2. PUBLISH (FIXED CONTEXT)
      # ==========================================
      - name: Log in to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: . # WICHTIG: Kontext bleibt Root
          file: ./docker/Dockerfile # Dockerfile liegt in /docker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
