name: Build, Test and Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # 1. SMOKETEST
      # ==========================================
      - name: Run Smoketest
        run: |
          # Wir erstellen die Datei direkt im docker-Ordner UND nennen sie .env.dev,
          # da deine docker-compose.dev.yml genau diese Datei erwartet.
          echo "DB_PASSWORD=testpass" > docker/.env.dev
          echo "DB_ROOT_PASSWORD=testroot" >> docker/.env.dev
          echo "DB_USER=admin" >> docker/.env.dev
          echo "DB_NAME=lyndrix_db" >> docker/.env.dev
          echo "DB_HOST=db" >> docker/.env.dev
          echo "VAULT_URL=http://vault:8200" >> docker/.env.dev
          echo "STORAGE_SECRET=test_secret_12345" >> docker/.env.dev
          echo "LYNDRIX_MASTER_KEY=12345678901234567890123456789012" >> docker/.env.dev

          # Starte mit explizitem Pfad zur Dev-Compose
          docker compose -f docker/docker-compose.dev.yml up -d --build

          echo "Warte auf System-Boot (30s)..."
          sleep 30

          # Prüfe, ob die Container noch laufen oder gecrasht sind
          docker ps

          if curl --retry 5 --retry-delay 5 -f http://localhost:8081/; then
            echo "✅ TEST BESTANDEN!"
          else
            echo "❌ TEST FEHLGESCHLAGEN! Zeige Logs von Lyndrix und DB:"
            docker compose -f docker/docker-compose.dev.yml logs lyndrix
            docker compose -f docker/docker-compose.dev.yml logs db
            exit 1
          fi

          docker compose -f docker/docker-compose.dev.yml down -v

      # ==========================================
      # 2. PUBLISH
      # ==========================================
      - name: Log in to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: . # Kontext ist Root, damit app/ und docker/ sichtbar sind
          file: ./docker/Dockerfile # Pfad zum Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
