name: Build, Test and Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # 0. METADATA & TAGS (BEST PRACTICE)
      # ==========================================
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      # ==========================================
      # 1. SMOKETEST (THE FINISHER)
      # ==========================================
      - name: Run Smoketest
        run: |
          # Wir erstellen eine Datei namens .env im docker-Ordner.
          # Das ist der Standardpfad, den Docker Compose IMMER prüft.
          cat <<EOF > docker/.env
          ENV_TYPE=dev
          DB_HOST=db
          DB_NAME=lyndrix_db
          DB_USER=admin
          DB_PASSWORD=testpass
          DB_ROOT_PASSWORD=testroot
          STORAGE_SECRET=test_secret_12345
          LYNDRIX_MASTER_KEY=12345678901234567890123456789012
          VAULT_URL=http://vault:8200
          VAULT_SKIP_VERIFY=true
          EOF

          # Wir kopieren sie zur Sicherheit auch als .env.dev, 
          # falls das YAML explizit darauf verweist
          cp docker/.env docker/.env.dev

          # Start ohne Schnörkel
          docker compose -f docker/docker-compose.dev.yml up -d --build

          echo "Warte 30s auf MariaDB & Lyndrix..."
          sleep 30

          # Zeige uns, was passiert ist (hilft enorm beim Debuggen)
          docker ps -a
          docker compose -f docker/docker-compose.dev.yml logs db

          if curl --retry 5 --retry-delay 5 -f http://localhost:8081/; then
            echo "✅ ENDLICH! TEST BESTANDEN!"
          else
            echo "❌ IMMER NOCH NICHT? Logs von Lyndrix:"
            docker compose -f docker/docker-compose.dev.yml logs lyndrix
            exit 1
          fi

          docker compose -f docker/docker-compose.dev.yml down -v

      # ==========================================
      # 2. PUBLISH (FIXED CONTEXT)
      # ==========================================
      - name: Log in to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: . # WICHTIG: Kontext bleibt Root
          file: ./docker/Dockerfile # Dockerfile liegt in /docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
