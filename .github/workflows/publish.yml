name: Build, Test and Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================
      # 1. SMOKETEST (FIXED PATHS)
      # ==========================================
      - name: Run Smoketest
        run: |
          # Wir schreiben die Datei direkt in den docker/ Ordner
          # Wir nutzen MARIADB_ Namen, damit der Container direkt startet
          cat <<EOF > docker/.env.dev
          ENV_TYPE=dev
          MARIADB_ROOT_PASSWORD=testroot
          MARIADB_DATABASE=lyndrix_db
          MARIADB_USER=admin
          MARIADB_PASSWORD=testpass
          DB_HOST=db
          DB_NAME=lyndrix_db
          DB_USER=admin
          DB_PASSWORD=testpass
          DB_ROOT_PASSWORD=testroot
          STORAGE_SECRET=test_secret_12345
          VAULT_URL=http://vault:8200
          VAULT_SKIP_VERIFY=true
          LYNDRIX_MASTER_KEY=12345678901234567890123456789012
          EOF

          # Wir sagen Docker: Nimm die Datei aus /docker und das Compose-File aus /docker
          docker compose -f docker/docker-compose.dev.yml --env-file docker/.env.dev up -d --build

          echo "Warte auf System-Boot (30s)..."
          sleep 30

          # Prüfen ob Lyndrix antwortet
          if curl --retry 5 --retry-delay 5 -f http://localhost:8081/; then
            echo "✅ TEST BESTANDEN!"
          else
            echo "❌ TEST FEHLGESCHLAGEN! Logs:"
            docker compose -f docker/docker-compose.dev.yml logs db
            docker compose -f docker/docker-compose.dev.yml logs lyndrix
            exit 1
          fi
          docker compose -f docker/docker-compose.dev.yml down -v

      # ==========================================
      # 2. PUBLISH (FIXED CONTEXT)
      # ==========================================
      - name: Log in to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: . # WICHTIG: Kontext bleibt Root
          file: ./docker/Dockerfile # Dockerfile liegt in /docker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
